<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pogoda - Aleksandra Reja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(to bottom, #3b82f6, #2563eb);
            min-height: 100vh;
            font-family: -apple-system, Helvetica, Arial, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        select option {
            background-color: white;
            color: #4b5563;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="glass rounded-3xl p-8 shadow-2xl text-white">
            <h1 class="text-3xl font-light text-center mb-2">Moja Pogoda</h1>
            <p class="text-sm text-center opacity-80 mb-8">Zadanie 1 - Aleksandra Reja</p>

            <form id="weatherForm" class="space-y-4">
                <div>
                    <label for="country" class="block text-xs font-semibold uppercase tracking-wider mb-1 opacity-70">Kraj</label>
                    <select id="country" name="country" required
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/50 transition-all cursor-pointer">
                        <option value="" disabled selected>Wybierz kraj</option>
                        <option value="PL">Polska</option>
                        <option value="DE">Niemcy</option>
                        <option value="FR">Francja</option>
                    </select>
                </div>

                <div>
                    <label for="city" class="block text-xs font-semibold uppercase tracking-wider mb-1 opacity-70">Miasto</label>
                    <select id="city" name="city" required disabled
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-white/50 transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed">
                        <option value="" disabled selected>Najpierw wybierz kraj</option>
                    </select>
                </div>

                <button type="submit" 
                    class="w-full bg-white text-blue-600 font-bold py-3 rounded-xl hover:bg-opacity-90 active:scale-95 transition-all shadow-lg mt-4">
                    Sprawdź pogodę
                </button>
            </form>

            <div id="weatherResult" class="mt-10 text-center transition-all duration-500">
            </div>
        </div>
    </div>

    <script>
        const cityData = {
            "PL": ["Lublin", "Warszawa", "Kraków"],
            "DE": ["Berlin", "Monachium", "Hamburg"],
            "FR": ["Paryż", "Lyon", "Marsylia"]
        };

        const countrySelect = document.getElementById('country');
        const citySelect = document.getElementById('city');

        //Dynamiczna aktualizacja listy miast przy zmianie kraju
        countrySelect.addEventListener('change', () => {
            const selectedCountry = countrySelect.value;
            const cities = cityData[selectedCountry];

            //Resetowanie i odblokowanie listy miast
            citySelect.innerHTML = '<option value="" disabled selected>Wybierz miasto</option>';
            citySelect.disabled = false;

            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
        });

        document.getElementById('weatherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const city = citySelect.value;
            const country = countrySelect.value;
            const resultDiv = document.getElementById('weatherResult');

            resultDiv.innerHTML = '<div class="animate-pulse text-sm">Pobieranie danych...</div>';

            try {
                const response = await fetch(`/api/weather?city=${city}&country=${country}`);
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <div class="animate-fadeIn">
                        <h2 class="text-2xl font-semibold mb-1">${data.location}</h2>
                        <div class="text-6xl font-thin my-4">${data.temp}</div>
                        <p class="text-lg capitalize opacity-90">${data.desc}</p>
                        <div class="mt-4 pt-4 border-t border-white/10 text-xs opacity-60">
                            Dane pobrane pomyślnie
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Błąd:', error);
                resultDiv.innerHTML = `
                    <div class="bg-red-500/20 p-4 rounded-xl text-sm">
                        Nie udało się pobrać prognozy. Sprawdź połączenie z serwerem.
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
